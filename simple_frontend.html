<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dragonfly Tables</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
      }

      h1 {
        margin: 0 0 12px;
      }

      table,
      th,
      td {
        border: 1px solid #ccc;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 6px 8px;
        text-align: center;
      }

      input,
      button,
      select {
        font: inherit;
        margin: 0 8px 8px 0;
        padding: 4px 8px;
        border: 1px solid #ccc;
        background: #fff;
      }

      input[type="number"] {
        width: 6ch;
        text-align: right;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #tablesRoot {
        margin-top: 12px;
      }

      section {
        margin-top: 18px;
      }

      .readonly {
        opacity: 0.75;
      }

      .table-wrap {
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Input Tables</h1>

    <div>
      <input id="username" type="text" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn" type="button">Login</button>
      <button id="registerBtn" type="button">Register</button>
      <span id="message"></span>
    </div>

    <div>
      <label for="weekSelect">Week:</label>
      <select id="weekSelect"></select>
      <input id="newWeekName" type="text" placeholder="week2" />
      <button id="createWeekBtn" type="button">Create week</button>
    </div>

    <div id="tablesRoot"></div>

    <script>
      const API_BASE = window.location.origin.startsWith("http")
        ? window.location.origin
        : "http://127.0.0.1:8090";
      const AUTH_KEY = "dragonfly_pb_auth";

      const days = [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "sunday",
      ];
      const exercises = ["ex1", "ex2", "ex3"];
      const dayLabels = [
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
        "Sunday",
      ];
      const formulaColumns = [
        {
          label: "Sum",
          compute: (values) =>
            values.reduce((total, value) => total + value, 0),
        },
        {
          label: "Mean",
          compute: (values) =>
            values.length
              ? (
                  values.reduce((total, value) => total + value, 0) /
                  values.length
                ).toFixed(2)
              : "",
        },
        {
          label: "Max",
          compute: (values) => (values.length ? Math.max(...values) : ""),
        },
      ];

      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");
      const weekSelect = document.getElementById("weekSelect");
      const newWeekName = document.getElementById("newWeekName");
      const createWeekBtn = document.getElementById("createWeekBtn");
      const messageEl = document.getElementById("message");
      const tablesRoot = document.getElementById("tablesRoot");

      let auth = loadAuth();
      let workbooks = [];
      let currentWeek = "week1";

      function loadAuth() {
        try {
          const raw = localStorage.getItem(AUTH_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function saveAuth() {
        if (auth) localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
      }

      function setMessage(text) {
        messageEl.textContent = text;
      }

      function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
        return fetch(`${API_BASE}${path}`, { ...options, headers });
      }

      function currentUserId() {
        return auth?.record?.id || null;
      }

      function currentUsername() {
        return auth?.record?.username || "guest";
      }

      function workbookForCurrentUser() {
        const userId = currentUserId();
        if (!userId) return null;

        let workbook = workbooks.find((item) => item.userId === userId);
        if (!workbook) {
          workbook = {
            id: null,
            userId,
            label: currentUsername(),
            db: {},
            editable: true,
          };
          workbooks.unshift(workbook);
        }

        workbook.editable = true;
        workbook.label = currentUsername();
        return workbook;
      }

      function allWeeks() {
        const weeks = new Set();
        workbooks.forEach((workbook) =>
          Object.keys(workbook.db || {}).forEach((weekName) =>
            weeks.add(weekName),
          ),
        );
        return Array.from(weeks);
      }

      function syncWeekSelect() {
        const weeks = allWeeks();
        if (weeks.length && !weeks.includes(currentWeek))
          currentWeek = weeks[0];
        if (!weeks.length) currentWeek = currentWeek || "week1";

        weekSelect.innerHTML = (weeks.length ? weeks : ["week1"])
          .map(
            (weekName) =>
              `<option value="${weekName}" ${weekName === currentWeek ? "selected" : ""}>${weekName}</option>`,
          )
          .join("");
        weekSelect.value = currentWeek;
      }

      function rowValues(workbook, exercise) {
        return days
          .map((day) => workbook.db?.[currentWeek]?.[exercise]?.[day])
          .filter((value) => value !== "" && !Number.isNaN(Number(value)))
          .map(Number);
      }

      function buildTable(workbook) {
        const rows = exercises
          .map((exercise) => {
            const values = rowValues(workbook, exercise);
            const formulas = formulaColumns
              .map(
                (formula, index) =>
                  `<td class="formula-cell" data-formula-index="${index}">${formula.compute(values)}</td>`,
              )
              .join("");
            const cells = days
              .map((day) => {
                const value =
                  workbook.db?.[currentWeek]?.[exercise]?.[day] ?? "";
                const disabled = workbook.editable ? "" : "disabled";
                return `<td><input type="number" name="${exercise}_${day}" value="${value}" ${disabled} /></td>`;
              })
              .join("");
            return `<tr data-exercise="${exercise}"><td>${exercise.toUpperCase()}</td>${cells}${formulas}</tr>`;
          })
          .join("");

        return `
          <table>
            <tr>
              <th>Exercise</th>
              ${dayLabels.map((label) => `<th>${label}</th>`).join("")}
              ${formulaColumns.map((formula) => `<th>${formula.label}</th>`).join("")}
            </tr>
            ${rows}
          </table>
        `;
      }

      function refreshFormulaCells(row, workbook, exercise) {
        const values = rowValues(workbook, exercise);
        row.querySelectorAll(".formula-cell").forEach((cell) => {
          const index = Number(cell.dataset.formulaIndex);
          cell.textContent = formulaColumns[index].compute(values);
        });
      }

      function ensureCellPath(workbook, exercise) {
        if (!workbook.db[currentWeek]) workbook.db[currentWeek] = {};
        if (!workbook.db[currentWeek][exercise])
          workbook.db[currentWeek][exercise] = {};
      }

      function setCell(workbook, exercise, day, value) {
        ensureCellPath(workbook, exercise);
        workbook.db[currentWeek][exercise][day] = value;
      }

      function render() {
        syncWeekSelect();
        tablesRoot.innerHTML = "";

        workbooks
          .map((workbook) => ({
            ...workbook,
            editable: workbook.userId === currentUserId(),
          }))
          .forEach((workbook) => {
            const section = document.createElement("section");
            section.className = workbook.editable ? "" : "readonly";
            section.innerHTML = `
              <div>${workbook.label}${workbook.editable ? " (you)" : ""}</div>
              <div class="table-wrap">${buildTable(workbook)}</div>
            `;

            if (workbook.editable) {
              section
                .querySelectorAll("input[type='number']")
                .forEach((inputEl) => {
                  inputEl.addEventListener("input", () => {
                    const row = inputEl.closest("tr");
                    const [exercise, day] = inputEl.name.split("_");
                    const value =
                      inputEl.value === "" ? "" : Number(inputEl.value);
                    setCell(workbook, exercise, day, value);
                    if (row) refreshFormulaCells(row, workbook, exercise);
                    saveWorkbook().catch((error) =>
                      setMessage(error.message || "Save failed"),
                    );
                  });
                });
            }

            tablesRoot.appendChild(section);
          });
      }

      function createWeek(weekName) {
        const name = weekName.trim();
        if (!name) return;

        const workbook = workbookForCurrentUser();
        if (!workbook) {
          setMessage("Log in first.");
          return;
        }

        if (!workbook.db[name]) workbook.db[name] = {};
        currentWeek = name;
        newWeekName.value = "";
        render();
        saveWorkbook().catch((error) =>
          setMessage(error.message || "Save failed"),
        );
      }

      async function loadWorkbooks() {
        const response = await api(
          "/api/collections/workbooks/records?perPage=200&skipTotal=1&expand=user",
        );
        const result = await response.json();
        if (!response.ok)
          throw new Error(result.message || "Could not load workbooks");

        workbooks = (result.items || []).map((record) => ({
          id: record.id,
          userId: record.user,
          label: record.expand?.user?.username || record.user,
          db: record.db || {},
          editable: false,
        }));

        workbookForCurrentUser();
        currentWeek = allWeeks()[0] || "week1";
        render();
      }

      async function saveWorkbook() {
        const workbook = workbookForCurrentUser();
        if (!workbook) return;

        const path = workbook.id
          ? `/api/collections/workbooks/records/${workbook.id}`
          : "/api/collections/workbooks/records";

        const response = await api(path, {
          method: workbook.id ? "PATCH" : "POST",
          body: JSON.stringify({ user: currentUserId(), db: workbook.db }),
        });
        const result = await response.json();

        if (!response.ok)
          throw new Error(result.message || "Could not save workbook");
        if (!workbook.id) workbook.id = result.id;
      }

      function escapeFilterValue(value) {
        return value.replaceAll("\\", "\\\\").replaceAll('"', '\\"');
      }

      function emailFromUsername(username) {
        const safe = encodeURIComponent(username).replaceAll("%", "");
        return `u${safe}@local.invalid`;
      }

      function extractUsernameTakenError(result) {
        const usernameError = result?.data?.username;
        if (!Array.isArray(usernameError) || !usernameError.length) return null;
        const isTaken = usernameError.some(
          (item) => item?.code === "validation_not_unique",
        );
        return isTaken ? "Username already taken." : null;
      }

      async function isUsernameTaken(username) {
        const filter = encodeURIComponent(
          `username="${escapeFilterValue(username)}"`,
        );
        const response = await api(
          `/api/collections/users/records?filter=${filter}&perPage=1&skipTotal=1`,
        );
        if (!response.ok) return false;
        const result = await response.json();
        return (result.items || []).length > 0;
      }

      async function login(identityArg, passwordArg) {
        const identity = (identityArg ?? usernameInput.value).trim();
        const password = (passwordArg ?? passwordInput.value).trim();
        if (!identity || !password) return;

        const response = await api(
          "/api/collections/users/auth-with-password",
          {
            method: "POST",
            body: JSON.stringify({ identity, password }),
          },
        );
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "Login failed");

        auth = result;
        saveAuth();
        setMessage(`Logged in as ${auth.record.username}`);
        await loadWorkbooks();
      }

      async function register() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username || !password) {
          setMessage("Enter username and password.");
          return;
        }

        if (!/^[a-zA-Z0-9._-]{3,32}$/.test(username)) {
          setMessage(
            "Username must be 3-32 chars: letters, numbers, dot, dash, underscore.",
          );
          return;
        }

        const taken = await isUsernameTaken(username);
        if (taken) {
          setMessage("Username already taken.");
          return;
        }

        const response = await api("/api/collections/users/records", {
          method: "POST",
          body: JSON.stringify({
            username,
            email: emailFromUsername(username),
            password,
            passwordConfirm: password,
          }),
        });
        const result = await response.json();

        if (!response.ok) {
          const takenMessage = extractUsernameTakenError(result);
          throw new Error(
            takenMessage || result.message || "Registration failed",
          );
        }

        await login(username, password);
      }

      loginBtn.addEventListener("click", () => {
        login().catch((error) => setMessage(error.message));
      });

      registerBtn.addEventListener("click", () => {
        register().catch((error) => setMessage(error.message));
      });

      weekSelect.addEventListener("change", () => {
        currentWeek = weekSelect.value;
        render();
      });

      createWeekBtn.addEventListener("click", () =>
        createWeek(newWeekName.value),
      );

      if (auth?.record?.username) {
        setMessage(`Logged in as ${auth.record.username}`);
      }

      loadWorkbooks().catch(() => {
        setMessage("Log in to load PocketBase data.");
        render();
      });
    </script>
  </body>
</html>
