<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Dragonfly Tables helps track weekly exercise goals with local JSON-backed storage."
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Dragonfly Tables</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
      }

      h1 {
        margin: 0 0 12px;
      }

      table,
      th,
      td {
        border: 1px solid #ccc;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 6px 8px;
        text-align: center;
        min-width: 56px;
      }

      input,
      button,
      select {
        font: inherit;
        margin: 0 8px 8px 0;
        padding: 4px 8px;
        border: 1px solid #ccc;
        background: #fff;
      }

      input[type="number"] {
        width: 6ch;
        text-align: right;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #tablesRoot {
        margin-top: 12px;
      }

      section {
        margin-top: 18px;
      }

      .readonly {
        opacity: 0.75;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .goal-col {
        border-right: 3px solid #999;
        background: #fafafa;
        background: #fff6cc;
      }

      .weight-col {
        background: #f4f8ff;
      }

      .sum-cell {
        background: #efe4ff;
      }

      .weight-input {
        width: 8ch;
        text-align: right;
      }

      .goal-col {
        border-right: 3px solid #999;
      }

      .performance-cell {
        min-width: 78px;
        font-weight: 600;
      }

      .performance-percent {
        color: #1f1f1f;
      }

      .goal-yes {
        background: #d7f5d7;
        color: #0f5a0f;
      }

      .goal-no {
        background: #f7d7d7;
        color: #8c1414;
      }

      .performance-neutral {
        background: #f3f3f3;
        color: #666;
      }

      .weekly-summary {
        margin-top: 8px;
      }

      .weekly-summary td,
      .weekly-summary th {
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <h1>Input Tables</h1>

    <div>
      <div id="authForm">
        <input id="username" type="text" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <button id="loginBtn" type="button">Login</button>
        <button id="registerBtn" type="button">Register</button>
      </div>
      <div id="loggedInControls" hidden>
        <span>Logged in as <strong id="loggedInUsername"></strong></span>
        <button id="logoutBtn" type="button">Log out</button>
      </div>
      <span id="message"></span>
    </div>

    <div>
      <label for="weekSelect">Week:</label>
      <button id="prevWeekBtn" type="button" aria-label="Previous week">
        ←
      </button>
      <select id="weekSelect"></select>
      <button id="nextWeekBtn" type="button" aria-label="Next week">→</button>
      <!-- <input
        id="customWeekName"
        type="text"
        placeholder="Week 06.04.26 - 13.04.26"
      /> -->
      <!-- <button id="createCustomWeekBtn" type="button">Create custom week</button> -->
      <button id="createWeekBtn" type="button">Create current week</button>
      <button id="backupBtn" type="button">Export backup JSON</button>
    </div>

    <div id="tablesRoot"></div>

    <script>
      const API_BASE =
        window.__DRAGONFLY_API_BASE__ ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:8090");
      const AUTH_KEY = "dragonfly_local_auth";

      const days = [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "sunday",
      ];
      const exercises = ["Push-up", "Pull-up", "Crunch", "Custom1", "Custom2"];
      const dayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const performanceColumns = ["Sum", "%", "Weighted", "Mean", "SD"];

      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");
      const authForm = document.getElementById("authForm");
      const loggedInControls = document.getElementById("loggedInControls");
      const loggedInUsername = document.getElementById("loggedInUsername");
      const logoutBtn = document.getElementById("logoutBtn");
      const weekSelect = document.getElementById("weekSelect");
      const prevWeekBtn = document.getElementById("prevWeekBtn");
      const nextWeekBtn = document.getElementById("nextWeekBtn");
      const customWeekName = document.getElementById("customWeekName");
      const createCustomWeekBtn = document.getElementById(
        "createCustomWeekBtn",
      );
      const createWeekBtn = document.getElementById("createWeekBtn");
      const backupBtn = document.getElementById("backupBtn");
      const messageEl = document.getElementById("message");
      const tablesRoot = document.getElementById("tablesRoot");

      let auth = loadAuth();
      let workbooks = [];
      let currentWeek = "week1";

      function loadAuth() {
        try {
          const raw = localStorage.getItem(AUTH_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function saveAuth() {
        if (auth) localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
      }

      function clearAuth() {
        auth = null;
        localStorage.removeItem(AUTH_KEY);
      }

      function resetLoggedOutState(message) {
        clearAuth();
        workbooks = [];
        currentWeek = currentDateWeekLabel();
        setMessage(message || "Log in to load local data.");
        render();
      }

      function renderAuthControls() {
        const isLoggedIn = Boolean(auth?.token && auth?.record?.username);
        authForm.hidden = isLoggedIn;
        loggedInControls.hidden = !isLoggedIn;
        loggedInUsername.textContent = auth?.record?.username || "";
      }

      function downloadTextFile(filename, content) {
        const blob = new Blob([content], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function exportBackup() {
        const backup = {
          exportedAt: new Date().toISOString(),
          app: "Dragonfly Tables",
          currentWeek,
          weeks: sortWeeks(allWeeks()),
          workbooks: workbooks.map((workbook) => ({
            id: workbook.id,
            userId: workbook.userId,
            label: workbook.label,
            db: workbook.db,
          })),
        };

        const stamp = new Date()
          .toISOString()
          .replaceAll(":", "-")
          .replaceAll(".", "-");
        downloadTextFile(
          `dragonfly-backup-${stamp}.json`,
          JSON.stringify(backup, null, 2),
        );
        setMessage("Backup JSON downloaded.");
      }

      function setMessage(text) {
        messageEl.textContent = text;
      }

      function guardAuthenticatedEdit() {
        if (currentUserId()) return true;
        const message = "Log in first.";
        setMessage(message);
        alert(message);
        return false;
      }

      function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
        return fetch(`${API_BASE}${path}`, { ...options, headers });
      }

      function currentUserId() {
        return auth?.record?.id || null;
      }

      function currentUsername() {
        return auth?.record?.username || "guest";
      }

      function workbookForCurrentUser() {
        const userId = currentUserId();
        if (!userId) return null;

        let workbook = workbooks.find((item) => item.userId === userId);
        if (!workbook) {
          workbook = {
            id: null,
            userId,
            label: currentUsername(),
            db: {},
            editable: true,
          };
          workbooks.unshift(workbook);
        }

        workbook.editable = true;
        workbook.label = currentUsername();
        return workbook;
      }

      function allWeeks() {
        const weeks = new Set();
        workbooks.forEach((workbook) =>
          Object.keys(workbook.db || {}).forEach((weekName) =>
            weeks.add(weekName),
          ),
        );
        return Array.from(weeks);
      }

      function mondayStartOf(date) {
        const local = new Date(
          date.getFullYear(),
          date.getMonth(),
          date.getDate(),
        );
        const day = local.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        local.setDate(local.getDate() + diff);
        local.setHours(0, 0, 0, 0);
        return local;
      }

      function addDays(date, count) {
        const result = new Date(date);
        result.setDate(result.getDate() + count);
        return result;
      }

      function formatWeekDate(date) {
        const day = String(date.getDate()).padStart(2, "0");
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const year = String(date.getFullYear()).slice(-2);
        return `${day}.${month}.${year}`;
      }

      function weekLabelFromMonday(monday) {
        const nextMonday = addDays(monday, 7);
        return `Week ${formatWeekDate(monday)} - ${formatWeekDate(nextMonday)}`;
      }

      function currentDateWeekLabel() {
        return weekLabelFromMonday(mondayStartOf(new Date()));
      }

      function parseWeekLabelStart(weekName) {
        const match = /^Week (\d{2})\.(\d{2})\.(\d{2}) -/.exec(weekName);
        if (!match) return null;
        const [, dd, mm, yy] = match;
        return new Date(Number(`20${yy}`), Number(mm) - 1, Number(dd));
      }

      function sortWeeks(weeks) {
        return [...weeks].sort((left, right) => {
          const leftDate = parseWeekLabelStart(left);
          const rightDate = parseWeekLabelStart(right);
          if (leftDate && rightDate) return leftDate - rightDate;
          return left.localeCompare(right);
        });
      }

      function previousWeekName(weekName, workbook) {
        const sorted = sortWeeks(Object.keys(workbook.db || {}));
        const index = sorted.indexOf(weekName);
        if (index <= 0) return null;
        return sorted[index - 1];
      }

      function copyGoals(workbook, fromWeek, toWeek) {
        if (!fromWeek || !workbook.db[fromWeek]) return;
        if (!workbook.db[toWeek]) workbook.db[toWeek] = {};

        exercises.forEach((exercise) => {
          const sourceGoal = workbook.db[fromWeek]?.[exercise]?.goal;
          const sourceWeight = workbook.db[fromWeek]?.[exercise]?.weight;

          if (!workbook.db[toWeek][exercise])
            workbook.db[toWeek][exercise] = {};

          if (
            sourceGoal !== undefined &&
            sourceGoal !== "" &&
            workbook.db[toWeek][exercise].goal === undefined
          ) {
            workbook.db[toWeek][exercise].goal = sourceGoal;
          }

          if (
            sourceWeight !== undefined &&
            sourceWeight !== "" &&
            workbook.db[toWeek][exercise].weight === undefined
          ) {
            workbook.db[toWeek][exercise].weight = sourceWeight;
          }
        });
      }

      function ensureWeekForWorkbook(workbook, weekName) {
        if (workbook.db[weekName]) return false;

        workbook.db[weekName] = {};
        const previousWeek = previousWeekName(weekName, workbook);
        copyGoals(workbook, previousWeek, weekName);
        return true;
      }

      function ensureWeekForAllWorkbooks(weekName) {
        let currentUserChanged = false;
        workbooks.forEach((workbook) => {
          const changed = ensureWeekForWorkbook(workbook, weekName);
          if (changed && workbook.userId === currentUserId()) {
            currentUserChanged = true;
          }
        });
        return currentUserChanged;
      }

      function syncWeekSelect() {
        const weeks = sortWeeks(allWeeks());
        if (weeks.length && !weeks.includes(currentWeek))
          currentWeek = weeks[weeks.length - 1];
        if (!weeks.length) currentWeek = currentWeek || currentDateWeekLabel();

        weekSelect.innerHTML = (weeks.length ? weeks : [currentDateWeekLabel()])
          .map(
            (weekName) =>
              `<option value="${weekName}" ${weekName === currentWeek ? "selected" : ""}>${weekName}</option>`,
          )
          .join("");
        weekSelect.value = currentWeek;
        prevWeekBtn.disabled = weeks.indexOf(currentWeek) <= 0;
        nextWeekBtn.disabled =
          weeks.indexOf(currentWeek) < 0 ||
          weeks.indexOf(currentWeek) >= weeks.length - 1;
        return weeks;
      }

      function rowValues(workbook, exercise) {
        return days
          .map((day) => workbook.db?.[currentWeek]?.[exercise]?.[day])
          .filter((value) => value !== "" && !Number.isNaN(Number(value)))
          .map(Number);
      }

      function getExerciseStats(workbook, exercise) {
        const values = rowValues(workbook, exercise);
        const sum = values.reduce((total, value) => total + value, 0);
        const mean = values.length ? sum / values.length : null;
        const variance = values.length
          ? values.reduce((total, value) => total + (value - mean) ** 2, 0) /
            values.length
          : null;
        const stdDev = variance === null ? null : Math.sqrt(variance);
        const goalRaw = workbook.db?.[currentWeek]?.[exercise]?.goal;
        const weightRaw = workbook.db?.[currentWeek]?.[exercise]?.weight;
        const goal =
          goalRaw === "" || goalRaw === undefined ? null : Number(goalRaw);
        const weight =
          weightRaw === "" || weightRaw === undefined
            ? null
            : Number(weightRaw);
        const hasGoal = Number.isFinite(goal) && goal > 0;
        const hasWeight = Number.isFinite(weight);
        const percentage = hasGoal ? (sum / goal) * 100 : null;
        const weighted = hasWeight ? sum * weight : null;
        const weightedGoal = hasGoal && hasWeight ? goal * weight : null;

        return {
          sum,
          hasGoal,
          percentage,
          mean,
          stdDev,
          hasWeight,
          weighted,
          weightedGoal,
        };
      }

      function getWeeklyWeightedSummary(workbook) {
        const statsByExercise = exercises.map((exercise) =>
          getExerciseStats(workbook, exercise),
        );
        const weightedGoalTotal = statsByExercise.reduce(
          (total, stats) => total + (stats.weightedGoal ?? 0),
          0,
        );
        const weightedTotal = statsByExercise.reduce(
          (total, stats) => total + (stats.weighted ?? 0),
          0,
        );
        const weightedPercentage =
          weightedGoalTotal > 0
            ? (weightedTotal / weightedGoalTotal) * 100
            : null;

        return { weightedGoalTotal, weightedTotal, weightedPercentage };
      }

      function percentageBackground(percentage) {
        const clamped = Math.max(0, Math.min(100, percentage));
        const hue = clamped * 1.2;
        return `hsl(${hue} 78% 86%)`;
      }

      function renderPerformanceCell(index, stats) {
        if (index === 0) {
          return `<td class="performance-cell sum-cell" data-performance-index="0">${stats.sum}</td>`;
        }

        if (index === 1) {
          if (!stats.hasGoal) {
            return `<td class="performance-cell goal-col performance-neutral" data-performance-index="1">—</td>`;
          }

          const percent = Math.max(0, stats.percentage);
          const label = `${Math.round(percent)}%`;
          const background = percentageBackground(percent);
          return `<td class="performance-cell goal-col performance-percent" data-performance-index="1" style="background:${background}">${label}</td>`;
        }

        if (index === 2) {
          if (!stats.hasWeight) {
            return `<td class="performance-cell performance-neutral" data-performance-index="2">—</td>`;
          }

          return `<td class="performance-cell" data-performance-index="2">${stats.weighted.toFixed(2)}</td>`;
        }

        if (index === 3) {
          if (stats.mean === null) {
            return `<td class="performance-cell performance-neutral" data-performance-index="3">—</td>`;
          }

          return `<td class="performance-cell" data-performance-index="3">${stats.mean.toFixed(2)}</td>`;
        }

        if (stats.stdDev === null) {
          return `<td class="performance-cell performance-neutral" data-performance-index="4">—</td>`;
        }

        return `<td class="performance-cell" data-performance-index="4">${stats.stdDev.toFixed(2)}</td>`;
      }

      function applyPerformanceCell(cell, index, stats) {
        cell.className = "performance-cell";
        cell.style.background = "";

        if (index === 0) {
          cell.textContent = String(stats.sum);
          cell.classList.add("sum-cell");
          return;
        }

        if (index === 1) {
          if (!stats.hasGoal) {
            cell.textContent = "—";
            cell.classList.add("goal-col");
            cell.classList.add("performance-neutral");
            return;
          }

          const percent = Math.max(0, stats.percentage);
          cell.textContent = `${Math.round(percent)}%`;
          cell.classList.add("goal-col");
          cell.classList.add("performance-percent");
          cell.style.background = percentageBackground(percent);
          return;
        }

        if (index === 2) {
          if (!stats.hasWeight) {
            cell.textContent = "—";
            cell.classList.add("performance-neutral");
            return;
          }

          cell.textContent = stats.weighted.toFixed(2);
          return;
        }

        if (index === 3) {
          if (stats.mean === null) {
            cell.textContent = "—";
            cell.classList.add("performance-neutral");
            return;
          }

          cell.textContent = stats.mean.toFixed(2);
          return;
        }

        if (stats.stdDev === null) {
          cell.textContent = "—";
          cell.classList.add("performance-neutral");
          return;
        }

        cell.textContent = stats.stdDev.toFixed(2);
      }

      function buildTable(workbook) {
        const rows = exercises
          .map((exercise) => {
            const stats = getExerciseStats(workbook, exercise);
            const performanceCells = performanceColumns
              .map((_, index) => renderPerformanceCell(index, stats))
              .join("");
            const weightValue =
              workbook.db?.[currentWeek]?.[exercise]?.weight ?? "";
            const weightDisabled = workbook.editable ? "" : "disabled";
            const weightCell = `<td class="weight-col"><input class="weight-input" type="text" inputmode="decimal" name="${exercise}_weight" value="${weightValue}" ${weightDisabled} /></td>`;
            const goalValue =
              workbook.db?.[currentWeek]?.[exercise]?.goal ?? "";
            const goalDisabled = workbook.editable ? "" : "disabled";
            const goalCell = `<td class="goal-col"><input type="number" name="${exercise}_goal" value="${goalValue}" ${goalDisabled} /></td>`;
            const cells = days
              .map((day) => {
                const value =
                  workbook.db?.[currentWeek]?.[exercise]?.[day] ?? "";
                const disabled = workbook.editable ? "" : "disabled";
                return `<td><input type="number" name="${exercise}_${day}" value="${value}" ${disabled} /></td>`;
              })
              .join("");
            return `<tr data-exercise="${exercise}"><td>${exercise}</td>${weightCell}${goalCell}${cells}${performanceCells}</tr>`;
          })
          .join("");

        const weeklySummary = getWeeklyWeightedSummary(workbook);
        const weightedPercentLabel =
          weeklySummary.weightedPercentage === null
            ? "—"
            : `${Math.round(Math.max(0, weeklySummary.weightedPercentage))}%`;
        const weightedPercentStyle =
          weeklySummary.weightedPercentage === null
            ? ""
            : `style="background:${percentageBackground(weeklySummary.weightedPercentage)}"`;

        return `
          <table>
            <tr>
              <th>Exercise</th>
              <th class="weight-col">Weight</th>
              <th class="goal-col">Goal</th>
              ${dayLabels.map((label) => `<th>${label}</th>`).join("")}
              ${performanceColumns.map((label) => `<th>${label}</th>`).join("")}
            </tr>
            ${rows}
          </table>
          <table class="weekly-summary">
            <tr>
              <th>Weighted Goal</th>
              <th>Weighted Sum</th>
              <th>Weighted %</th>
            </tr>
            <tr>
              <td>${weeklySummary.weightedGoalTotal.toFixed(2)}</td>
              <td>${weeklySummary.weightedTotal.toFixed(2)}</td>
              <td class="performance-cell performance-percent" ${weightedPercentStyle}>${weightedPercentLabel}</td>
            </tr>
          </table>
        `;
      }

      function refreshPerformanceCells(row, workbook, exercise) {
        const stats = getExerciseStats(workbook, exercise);
        row.querySelectorAll(".performance-cell").forEach((cell) => {
          const index = Number(cell.dataset.performanceIndex);
          applyPerformanceCell(cell, index, stats);
        });
      }

      function refreshWeeklySummary(section, workbook) {
        const weeklySummary = getWeeklyWeightedSummary(workbook);
        const summaryCells = section.querySelectorAll(".weekly-summary td");
        if (summaryCells.length < 3) return;

        summaryCells[0].textContent =
          weeklySummary.weightedGoalTotal.toFixed(2);
        summaryCells[1].textContent = weeklySummary.weightedTotal.toFixed(2);

        const percentCell = summaryCells[2];
        percentCell.className = "performance-cell performance-percent";
        percentCell.style.background = "";
        if (weeklySummary.weightedPercentage === null) {
          percentCell.textContent = "—";
          return;
        }

        const percent = Math.max(0, weeklySummary.weightedPercentage);
        percentCell.textContent = `${Math.round(percent)}%`;
        percentCell.style.background = percentageBackground(percent);
      }

      function ensureCellPath(workbook, exercise) {
        if (!workbook.db[currentWeek]) workbook.db[currentWeek] = {};
        if (!workbook.db[currentWeek][exercise])
          workbook.db[currentWeek][exercise] = {};
      }

      function setCell(workbook, exercise, day, value) {
        ensureCellPath(workbook, exercise);
        workbook.db[currentWeek][exercise][day] = value;
      }

      function parseWeightValue(rawValue) {
        const text = String(rawValue ?? "").trim();
        if (text === "") return "";

        const ratio = text.match(
          /^([-+]?\d+(?:\.\d+)?)\s*\/\s*([-+]?\d+(?:\.\d+)?)$/,
        );
        if (ratio) {
          const numerator = Number(ratio[1]);
          const denominator = Number(ratio[2]);
          if (!Number.isFinite(numerator) || !Number.isFinite(denominator))
            return null;
          if (denominator === 0) return null;
          return numerator / denominator;
        }

        const numeric = Number(text);
        return Number.isFinite(numeric) ? numeric : null;
      }

      function render() {
        renderAuthControls();
        syncWeekSelect();
        tablesRoot.innerHTML = "";

        const sortedWorkbooks = [...workbooks].sort((left, right) => {
          const currentId = currentUserId();
          if (left.userId === currentId && right.userId !== currentId)
            return -1;
          if (right.userId === currentId && left.userId !== currentId) return 1;
          return String(left.label).localeCompare(String(right.label));
        });

        sortedWorkbooks
          .map((workbook) => ({
            ...workbook,
            editable: workbook.userId === currentUserId(),
          }))
          .forEach((workbook) => {
            const section = document.createElement("section");
            section.className = workbook.editable ? "" : "readonly";
            section.innerHTML = `
              <div>${workbook.label}${workbook.editable ? " (you)" : ""}</div>
              <div class="table-wrap">${buildTable(workbook)}</div>
            `;

            refreshWeeklySummary(section, workbook);

            if (workbook.editable) {
              section.querySelectorAll("input").forEach((inputEl) => {
                inputEl.addEventListener("input", () => {
                  if (!guardAuthenticatedEdit()) {
                    return;
                  }
                  const row = inputEl.closest("tr");
                  const [exercise, day] = inputEl.name.split("_");
                  let value;
                  if (day === "weight") {
                    value = parseWeightValue(inputEl.value);
                    if (value === null) {
                      setMessage("Weight must be a number or ratio like 1/6.");
                      return;
                    }
                  } else {
                    value = inputEl.value === "" ? "" : Number(inputEl.value);
                  }
                  setCell(workbook, exercise, day, value);
                  if (row) refreshPerformanceCells(row, workbook, exercise);
                  refreshWeeklySummary(section, workbook);
                  saveWorkbook().catch((error) =>
                    setMessage(error.message || "Save failed"),
                  );
                });

                // Alert on focus lost if the input contains invalid numeric content
                inputEl.addEventListener("blur", () => {
                  if (!guardAuthenticatedEdit()) return;
                  const raw = String(inputEl.value ?? "");
                  const name = inputEl.name || "";
                  const isWeight =
                    name.endsWith("_weight") ||
                    inputEl.classList.contains("weight-input");

                  if (isWeight) {
                    const parsed = parseWeightValue(raw);
                    if (raw.trim() !== "" && parsed === null) {
                      alert(
                        "Invalid weight value. Use a number or ratio like 1/6.",
                      );
                      setMessage("Invalid weight input.");
                    }
                  } else {
                    // numeric day/goal inputs: only alert on blur if not a finite number
                    if (raw.trim() !== "") {
                      const numeric = Number(raw);
                      if (!Number.isFinite(numeric)) {
                        alert(
                          "Invalid numeric input. Please enter a numeric value.",
                        );
                        setMessage("Invalid numeric input.");
                      }
                    }
                  }
                });
              });
            }

            tablesRoot.appendChild(section);
          });
      }

      async function createWeek(weekName) {
        const name = weekName.trim();
        if (!name) return;

        const workbook = workbookForCurrentUser();
        if (!workbook) {
          setMessage("Log in first.");
          return;
        }

        const currentUserChanged = ensureWeekForAllWorkbooks(name);
        currentWeek = name;
        render();

        if (currentUserChanged) {
          await saveWorkbook().catch((error) =>
            setMessage(error.message || "Save failed"),
          );
        }
      }

      async function loadWorkbooks() {
        const response = await api("/api/workbooks");
        const result = await response.json();
        if (response.status === 401) {
          resetLoggedOutState("Session expired. Log in again.");
          return;
        }
        if (!response.ok) {
          throw new Error(result.message || "Could not load workbooks");
        }

        workbooks = (result.items || []).map((record) => ({
          id: record.id,
          userId: record.userId,
          label: record.label || record.userId,
          db: record.db || {},
          editable: false,
        }));

        workbookForCurrentUser();
        const targetWeek = currentDateWeekLabel();
        const currentUserChanged = ensureWeekForAllWorkbooks(targetWeek);
        currentWeek = targetWeek;
        if (currentUserChanged) {
          await saveWorkbook();
        }
        render();
      }

      async function saveWorkbook() {
        const workbook = workbookForCurrentUser();
        if (!workbook) return;

        const response = await api("/api/workbooks", {
          method: "PUT",
          body: JSON.stringify({
            workbooks: workbooks.map((item) => ({
              userId: item.userId,
              db: item.db,
            })),
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          resetLoggedOutState("Session expired. Log in again.");
          throw new Error("Session expired. Log in again.");
        }

        if (!response.ok) {
          throw new Error(result.message || "Could not save workbook");
        }
      }

      async function login(identityArg, passwordArg) {
        const identity = (identityArg ?? usernameInput.value).trim();
        const password = (passwordArg ?? passwordInput.value).trim();
        if (!identity || !password) return;

        const response = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ username: identity, password }),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "Login failed");

        auth = result;
        saveAuth();
        setMessage(`Logged in as ${auth.record.username}`);
        await loadWorkbooks();
      }

      async function register() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username || !password) {
          setMessage("Enter username and password.");
          return;
        }

        if (!/^[a-zA-Z0-9._-]{2,32}$/.test(username)) {
          setMessage(
            "Username must be 2-32 chars: letters, numbers, dot, dash, underscore.",
          );
          return;
        }

        const response = await api("/api/register", {
          method: "POST",
          body: JSON.stringify({
            username,
            password,
          }),
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || "Registration failed");
        }

        await login(username, password);
      }

      loginBtn.addEventListener("click", () => {
        login().catch((error) => setMessage(error.message));
      });

      registerBtn.addEventListener("click", () => {
        register().catch((error) => setMessage(error.message));
      });

      logoutBtn.addEventListener("click", () => {
        resetLoggedOutState("Logged out.");
      });

      weekSelect.addEventListener("change", () => {
        currentWeek = weekSelect.value;
        render();
      });

      prevWeekBtn.addEventListener("click", () => {
        const weeks = sortWeeks(allWeeks());
        const index = weeks.indexOf(currentWeek);
        if (index > 0) {
          currentWeek = weeks[index - 1];
          render();
        }
      });

      nextWeekBtn.addEventListener("click", () => {
        const weeks = sortWeeks(allWeeks());
        const index = weeks.indexOf(currentWeek);
        if (index >= 0 && index < weeks.length - 1) {
          currentWeek = weeks[index + 1];
          render();
        }
      });

      createWeekBtn.addEventListener("click", () => {
        createWeek(currentDateWeekLabel()).catch((error) =>
          setMessage(error.message),
        );
      });

      if (createCustomWeekBtn && customWeekName) {
        createCustomWeekBtn.addEventListener("click", () => {
          createWeek(customWeekName.value).catch((error) =>
            setMessage(error.message),
          );
        });
      }

      backupBtn.addEventListener("click", () => {
        exportBackup();
      });

      if (auth?.record?.username) {
        setMessage(`Logged in as ${auth.record.username}`);
      }

      ["beforeinput", "keydown", "paste", "drop"].forEach((eventName) => {
        tablesRoot.addEventListener(
          eventName,
          (event) => {
            const target = event.target;
            if (!(target instanceof HTMLInputElement)) return;
            if (currentUserId()) return;
            event.preventDefault();
            event.stopPropagation();
            guardAuthenticatedEdit();
          },
          true,
        );
      });

      if (auth?.token) {
        loadWorkbooks().catch(() => {
          setMessage("Log in to load local data.");
          render();
        });
      } else {
        setMessage("Log in to load local data.");
        render();
      }
    </script>
  </body>
</html>
